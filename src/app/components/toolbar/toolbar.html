<div class="toolbar">
  <div class="tb-left">
    <button class="tb-btn primary"><i class="bi bi-folder-plus"></i> New Folder</button>
    <button class="tb-btn"><i class="bi bi-upload"></i> Upload</button>
    <div class="tb-sep"></div>
    <button class="tb-btn"><i class="bi bi-scissors"></i> Move</button>
    <button class="tb-btn"><i class="bi bi-files"></i> Copy</button>
    <button class="tb-btn"><i class="bi bi-share"></i> Share</button>
    <button class="tb-btn"><i class="bi bi-trash3"></i> Delete</button>
  </div>

  <div class="view-toggle">
    <button class="vt-btn" (click)="setView('grid')">
      <i class="bi bi-grid-3x2-gap-fill"></i>
    </button>
    <button class="vt-btn active" (click)="setView('list')">
      <i class="bi bi-list-ul"></i>
    </button>
  </div>
</div>
